version: "3.9"

services:
  # ── Streamlit Dashboard ──────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: telecom_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./feature_store:/app/feature_store
      - ./models_artifacts:/app/models_artifacts
      - ./reports:/app/reports
      - ./data:/app/data
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=telecom_analytics
      - MYSQL_USER=telecom_user
      - MYSQL_PASSWORD=telecom_pass
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - telecom_net

  # ── MLflow Tracking Server ────────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: telecom_mlflow
    command: >
      bash -c "pip install mlflow && mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - telecom_net
    restart: unless-stopped

  # ── MySQL Database ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: telecom_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: telecom_analytics
      MYSQL_USER: telecom_user
      MYSQL_PASSWORD: telecom_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - telecom_net
    restart: unless-stopped

volumes:
  mysql_data:
  mlflow_data:

networks:
  telecom_net:
    driver: bridge
